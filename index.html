<!DOCTYPE html>
<html>
<head>

  <style>

      margin: 0;

    }

      margin-top: 20px;

<body>

    <img src="learning.jpg" alt="Students">

    <br>
    <a href="joinus.html">

    </a>
  </div>

  <footer>
    <p>© 2026 She Can Foundation</p>
  </footer>
